# ============================================================
# AI Token Gateway - Docker Compose 编排文件
# 包含服务：Sub2API 主服务、PostgreSQL、Redis
# ============================================================

services:
  # ----------------------------------------------------------
  # Sub2API 主服务
  # ----------------------------------------------------------
  sub2api:
    image: ghcr.io/wei-shaw/sub2api:latest
    container_name: sub2api
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8080}:8080"
    environment:
      - DATABASE_URL=postgres://${POSTGRES_USER:-sub2api}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-sub2api}?sslmode=disable
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379
      - JWT_SECRET=${JWT_SECRET}
      - ADMIN_EMAIL=${ADMIN_EMAIL}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
      - TOTP_ENCRYPTION_KEY=${TOTP_ENCRYPTION_KEY:-}
      - LOG_LEVEL=${LOG_LEVEL:-info}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - sub2api-data:/app/data
      - ../logs:/app/logs
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    networks:
      - gateway-net

  # ----------------------------------------------------------
  # PostgreSQL 数据库
  # ----------------------------------------------------------
  postgres:
    image: postgres:15-alpine
    container_name: sub2api-postgres
    restart: unless-stopped
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-sub2api}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB:-sub2api}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-sub2api} -d ${POSTGRES_DB:-sub2api}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - gateway-net

  # ----------------------------------------------------------
  # Redis 缓存与限流
  # ----------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: sub2api-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    command: redis-server --requirepass ${REDIS_PASSWORD} --appendonly yes
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    networks:
      - gateway-net

# ----------------------------------------------------------
# 数据卷
# ----------------------------------------------------------
volumes:
  postgres-data:
    driver: local
  redis-data:
    driver: local
  sub2api-data:
    driver: local

# ----------------------------------------------------------
# 网络
# ----------------------------------------------------------
networks:
  gateway-net:
    driver: bridge
